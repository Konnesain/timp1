# Server configuration
server.port=2001

# H2 Database configuration (file-based, persists between restarts)
spring.datasource.url=jdbc:h2:file:./data/employeedb;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Logging
logging.level.com.timp=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.timp.service.SensorSimulator=INFO

# Sensor simulator
timp.simulator.enabled=false
timp.simulator.interval-ms=5000
